  <body style="background-color: #060914">
    <main class="container-fluid min-vh-100 text-light py-4 py-md-5">

            <div class="mb-4 text-center">

                    aria-label="Slide 1"

                    data-bs-target="#countryCarousel"

                    aria-label="Slide 2"
                  ></button>

                    <div class="ratio ratio-16x9">

                        id="carouselImg1"

                        title="Video 1 del país"

                        "

                  <div class="carousel-item">

                        class="d-none w-100 object-fit-cover"

                          autoplay;

                          gyroscope;
                          picture-in-picture;
                          web-share;

                  </div>
                </div>

                <button
                  class="carousel-control-prev"
                  type="button"
                  data-bs-target="#countryCarousel"
                  data-bs-slide="prev"
                >
                  <span
                    class="carousel-control-prev-icon"
                    aria-hidden="true"
                  ></span>
                  <span class="visually-hidden">Previous</span>
                </button>

                <button
                  class="carousel-control-next"
                  type="button"
                  data-bs-target="#countryCarousel"
                  data-bs-slide="next"
                >

                    class="carousel-control-next-icon"
                    aria-hidden="true"

              </div>
            </section>
          </section>

          <section id="notFound" class="text-center py-5" hidden>
            <h1 class="display-6 fw-semibold mb-3">País no encontrado</h1>
            <p class="text-secondary mb-4">
              El parámetro recibido no corresponde a un país válido.
            </p>
            <button
              type="button"
              class="btn btn-danger rounded-pill px-4"
              onclick="window.history.back()"
            >
              ← Regresar
            </button>
          </section>
        </div>
      </div>
    </main>

    <script>
  // ... (resto de PAISES_CONFIG, etc.) ...

  // Función de regreso mejorada
  function goBack() {
    // Primero intentamos usar history.back()
    if (document.referrer && document.referrer.length > 0) {
      window.history.back();
      // Como fallback, si después de 300ms la página no ha cambiado, redirigimos
      setTimeout(() => {
        // Si la URL sigue siendo la misma, asumimos que history.back() falló
        if (window.location.href === window.location.href) {
          window.location.href = './index.html';
        }
      }, 300);
    } else {
      // No hay referrer, redirigir directamente
      window.location.href = './index.html';
    }
  }

  // Asignar el evento al botón (asegurarse de que el elemento existe)
  document.addEventListener('DOMContentLoaded', () => {
    const backBtn = document.getElementById('backBtn');
    if (backBtn) {
      backBtn.addEventListener('click', goBack);
    }

    // También puedes asignar el evento al botón de la sección "País no encontrado"
    const notFoundBackBtn = document.querySelector('#notFound button');
    if (notFoundBackBtn) {
      notFoundBackBtn.onclick = goBack;
    }
  });
</script>

      function getCountryCodeFromUrl() {
        const params = new URLSearchParams(window.location.search);
        return (params.get("pais") || "").toUpperCase().trim();
      }

      function setCarouselMedia(slot, media, countryName) {
        const img = document.getElementById(`carouselImg${slot}`);
        const iframe = document.getElementById(`carouselVideo${slot}`);

        // 1. Si es imagen o no hay datos
        if (!media || media.type === "image") {
          img.src = media ? media.src : `./assets/${countryName}/image.jpg`;
          img.classList.remove("d-none");
          iframe.classList.add("d-none");
          iframe.src = "";
          return;
        }

        // 2. Si es Video o Youtube (aceptamos ambos términos por si acaso)
        if (media.type === "video" || media.type === "youtube") {
          let videoUrl = media.src;

          if (!videoUrl || videoUrl === "") {
            // Si el link está vacío, mostramos la bandera para que no se vea negro
            img.src = document.getElementById("countryFlag").src;
            img.classList.remove("d-none");
            iframe.classList.add("d-none");
            return;
          }

          // CONVERSIÓN CRÍTICA: De link normal a link de inserción (embed)
          if (videoUrl.includes("watch?v=")) {
            videoUrl = videoUrl.replace("watch?v=", "embed/");
          } else if (videoUrl.includes("youtu.be/")) {
            videoUrl = videoUrl.replace("youtu.be/", "youtube.com/embed/");
          }

          // Quitamos parámetros extra que ensucian el link y activamos la API
          videoUrl = videoUrl.split("&")[0];
          iframe.src = `${videoUrl}?enablejsapi=1&rel=0`;

          img.classList.add("d-none");
          iframe.classList.remove("d-none");
        }
      }
      function pauseAllCarouselVideos() {
        const iframes = document.querySelectorAll("#countryCarousel iframe");
        iframes.forEach((iframe) => {
          if (iframe.src && iframe.src.includes("youtube.com")) {
            // Envía un comando interno a YouTube para pausar sin recargar la página
            iframe.contentWindow.postMessage(
              '{"event":"command","func":"pauseVideo","args":""}',
              "*",
            );
          }
        });
      }

      function renderCountryInfo() {
        const code = getCountryCodeFromUrl();
        const country = PAISES_CONFIG[code];

        const countryInfo = document.getElementById("countryInfo");
        const notFound = document.getElementById("notFound");

        if (!country) {
          countryInfo.hidden = true;
          notFound.hidden = false;
          return;
        }

        document.getElementById("countryName").textContent = country.nombre;
        document.getElementById("countryFlag").src = country.bandera;
        document.getElementById("countryFlag").alt =
          `Bandera de ${country.nombre}`;
        document.getElementById("countryDescription").textContent =
          country.descripcion || "Sin descripción disponible.";

        const gallery = country.galeria || [
          { type: "image", src: country.bandera },
          {
            type: "youtube",
            src: "https://www.youtube.com/watch?v=D9o3OQJ5X-s",
          },
          { type: "image", src: country.bandera },
        ];

        setCarouselMedia(1, gallery[0], country.nombre);
        setCarouselMedia(2, gallery[1], country.nombre);
        setCarouselMedia(3, gallery[2], country.nombre);
      }

      document.getElementById("backBtn").addEventListener("click", () => {
        window.history.back();
      });

      document.addEventListener("DOMContentLoaded", () => {
        renderCountryInfo();

        const carouselElement = document.getElementById("countryCarousel");
        if (carouselElement) {
          carouselElement.addEventListener("slide.bs.carousel", () => {
            pauseAllCarouselVideos();
          });
        }
      });

      function pauseAllCarouselVideos() {
        const iframes = document.querySelectorAll("#countryCarousel iframe");

        iframes.forEach((iframe) => {
          const currentSrc = iframe.src;
          iframe.src = "";
          iframe.src = currentSrc;
        });
      }
